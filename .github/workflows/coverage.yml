name: coverage

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  coverage:
    runs-on: ubuntu-latest
    env:
      CDMCONNECTOR_TEST_DB: duckdb

    steps:
      - uses: actions/checkout@v4

      - name: Check required environment variables
        run: |
          missing=""
          if [ -z "${{ secrets.CODECOV_TOKEN }}" ]; then
            missing="${missing}  - CODECOV_TOKEN: required for uploading coverage to codecov.io. Add it under Settings > Secrets and variables > Actions.\n"
          fi
          if [ -n "$missing" ]; then
            echo "::error::Missing required environment variables:"
            printf "$missing" | while IFS= read -r line; do echo "::error::$line"; done
            printf "Missing required environment variables:\n$missing"
            exit 1
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests with coverage
        run: make coverage

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          slug: OHDSI/pyCDMConnector
          fail_ci_if_error: true
