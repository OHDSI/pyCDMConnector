name: postgres-test

on:
  push:
    branches: [main, master, test, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    env:
      CDMCONNECTOR_TEST_DB: postgres
      CDM5_POSTGRESQL_USER: ${{ secrets.CDM5_POSTGRESQL_USER }}
      CDM5_POSTGRESQL_PASSWORD: ${{ secrets.CDM5_POSTGRESQL_PASSWORD }}
      CDM5_POSTGRESQL_HOST: ${{ secrets.CDM5_POSTGRESQL_HOST }}
      CDM5_POSTGRESQL_PORT: ${{ secrets.CDM5_POSTGRESQL_PORT }}
      CDM5_POSTGRESQL_DBNAME: ${{ secrets.CDM5_POSTGRESQL_DBNAME }}
      CDM5_POSTGRESQL_CDM_SCHEMA: ${{ secrets.CDM5_POSTGRESQL_CDM_SCHEMA }}
      CDM5_POSTGRESQL_SCRATCH_SCHEMA: ${{ secrets.CDM5_POSTGRESQL_SCRATCH_SCHEMA }}

    steps:
      - uses: actions/checkout@v4

      - name: Check required environment variables
        run: |
          missing=""
          for var in CDM5_POSTGRESQL_USER CDM5_POSTGRESQL_PASSWORD CDM5_POSTGRESQL_HOST CDM5_POSTGRESQL_DBNAME CDM5_POSTGRESQL_CDM_SCHEMA CDM5_POSTGRESQL_SCRATCH_SCHEMA; do
            if [ -z "${!var}" ]; then
              missing="${missing}  - ${var}\n"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets for postgres tests. Set the following in Settings > Secrets and variables > Actions:"
            printf "$missing" | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev,postgres]"

      - name: Run tests
        run: pytest tests -m integration -v --tb=short
