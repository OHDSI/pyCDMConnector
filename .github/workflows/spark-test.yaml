name: spark-test

on:
  push:
    branches: [main, master, test, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    env:
      CDMCONNECTOR_TEST_DB: spark
      LEGACY_DATABRICKS_CONNECTION_STRING: ${{ secrets.CDM5_SPARK_CONNECTION_STRING }}
      LEGACY_DATABRICKS_TOKEN: ${{ secrets.CDM5_SPARK_PASSWORD }}
      LEGACY_DATABRICKS_CDM_SCHEMA: ${{ secrets.CDM5_SPARK_CDM_SCHEMA }}
      LEGACY_DATABRICKS_SCRATCH_SCHEMA: ${{ secrets.CDM5_SPARK_OHDSI_SCHEMA }}

    steps:
      - uses: actions/checkout@v4

      - name: Map legacy Databricks secrets
        shell: bash
        run: |
          conn="${LEGACY_DATABRICKS_CONNECTION_STRING}"
          host=""
          http_path=""

          if [ -n "$conn" ]; then
            host="${conn#jdbc:databricks://}"
            host="${host%%/*}"
            http_path="$(printf '%s' "$conn" | sed -n 's/.*;httpPath=\([^;]*\).*/\1/p')"
          fi

          {
            echo "DATABRICKS_HOST=${host}"
            echo "DATABRICKS_TOKEN=${LEGACY_DATABRICKS_TOKEN}"
            echo "DATABRICKS_HTTPPATH=${http_path}"
            echo "DATABRICKS_CDM_SCHEMA=${LEGACY_DATABRICKS_CDM_SCHEMA}"
            echo "DATABRICKS_SCRATCH_SCHEMA=${LEGACY_DATABRICKS_SCRATCH_SCHEMA}"
          } >> "$GITHUB_ENV"

      - name: Check required environment variables
        run: |
          missing=""
          for var in DATABRICKS_HOST DATABRICKS_TOKEN DATABRICKS_HTTPPATH DATABRICKS_CDM_SCHEMA DATABRICKS_SCRATCH_SCHEMA; do
            if [ -z "${!var}" ]; then
              missing="${missing}  - ${var}\n"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets for spark/databricks tests. Set the following in Settings > Secrets and variables > Actions:"
            printf "$missing" | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ibis-framework[databricks]

      - name: Run tests
        run: pytest tests -m integration -v --tb=short
