name: spark-test

on:
  push:
    branches: [main, master, test, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    env:
      CDMCONNECTOR_TEST_DB: spark
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_HTTPPATH: ${{ secrets.DATABRICKS_HTTPPATH }}
      DATABRICKS_CDM_SCHEMA: ${{ secrets.DATABRICKS_CDM_SCHEMA }}
      DATABRICKS_SCRATCH_SCHEMA: ${{ secrets.DATABRICKS_SCRATCH_SCHEMA }}

    steps:
      - uses: actions/checkout@v4

      - name: Check required environment variables
        run: |
          missing=""
          for var in DATABRICKS_HOST DATABRICKS_TOKEN DATABRICKS_HTTPPATH DATABRICKS_CDM_SCHEMA DATABRICKS_SCRATCH_SCHEMA; do
            if [ -z "${!var}" ]; then
              missing="${missing}  - ${var}\n"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets for spark/databricks tests. Set the following in Settings > Secrets and variables > Actions:"
            printf "$missing" | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ibis-framework[databricks]

      - name: Run tests
        run: pytest tests -m integration -v --tb=short
