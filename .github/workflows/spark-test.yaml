name: spark-test

on:
  push:
    branches: [main, master, test, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        run: |
          if [ -z "${{ secrets.DATABRICKS_HTTPPATH }}" ]; then
            echo "::notice::Skipping spark tests – DATABRICKS_HTTPPATH secret not configured"
            echo "has-secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-secrets=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    env:
      CDMCONNECTOR_TEST_DB: spark
      DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      DATABRICKS_HTTPPATH: ${{ secrets.DATABRICKS_HTTPPATH }}
      DATABRICKS_CDM_SCHEMA: ${{ secrets.DATABRICKS_CDM_SCHEMA }}
      DATABRICKS_SCRATCH_SCHEMA: ${{ secrets.DATABRICKS_SCRATCH_SCHEMA }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ibis-framework[databricks]

      - name: Run tests
        run: pytest tests -m integration -v --tb=short
