name: duckdb-test

on:
  push:
    branches: [main, master, test, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    env:
      CDMCONNECTOR_TEST_DB: duckdb

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        run: pytest tests -m integration -v --tb=short

      - name: Verify tests actually ran
        run: |
          if [ ! -f .pytest_cache/v/cache/lastfailed ] && [ ! -f .pytest_cache/v/cache/stepwise ]; then
            echo "Tests completed successfully"
          fi
