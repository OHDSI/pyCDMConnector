name: sqlserver-test

on:
  push:
    branches: [main, master, test, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    env:
      CDMCONNECTOR_TEST_DB: sqlserver
      CDM5_SQL_SERVER_USER: ${{ secrets.CDM5_SQL_SERVER_USER }}
      CDM5_SQL_SERVER_PASSWORD: ${{ secrets.CDM5_SQL_SERVER_PASSWORD }}
      CDM5_SQL_SERVER_SERVER: ${{ secrets.CDM5_SQL_SERVER_SERVER }}
      CDM5_SQL_SERVER_PORT: ${{ secrets.CDM5_SQL_SERVER_PORT }}
      CDM5_SQL_SERVER_CDM_DATABASE: ${{ secrets.CDM5_SQL_SERVER_CDM_DATABASE }}
      CDM5_SQL_SERVER_CDM_SCHEMA: ${{ secrets.CDM5_SQL_SERVER_CDM_SCHEMA }}
      CDM5_SQL_SERVER_SCRATCH_SCHEMA: ${{ secrets.CDM5_SQL_SERVER_SCRATCH_SCHEMA }}

    steps:
      - uses: actions/checkout@v4

      - name: Check required environment variables
        run: |
          missing=""
          for var in CDM5_SQL_SERVER_USER CDM5_SQL_SERVER_PASSWORD CDM5_SQL_SERVER_SERVER CDM5_SQL_SERVER_CDM_DATABASE CDM5_SQL_SERVER_CDM_SCHEMA CDM5_SQL_SERVER_SCRATCH_SCHEMA; do
            if [ -z "${!var}" ]; then
              missing="${missing}  - ${var}\n"
            fi
          done
          if [ -n "$missing" ]; then
            echo "::error::Missing required secrets for sqlserver tests. Set the following in Settings > Secrets and variables > Actions:"
            printf "$missing" | while IFS= read -r line; do echo "::error::$line"; done
            exit 1
          fi

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ibis-framework[mssql]

      - name: Run tests
        run: pytest tests -m integration -v --tb=short
