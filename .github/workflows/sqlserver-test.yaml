name: sqlserver-test

on:
  push:
    branches: [main, master, test, develop]
  pull_request:
    branches: [main, master, develop]

jobs:
  check-secrets:
    runs-on: ubuntu-latest
    outputs:
      has-secrets: ${{ steps.check.outputs.has-secrets }}
    steps:
      - id: check
        run: |
          if [ -z "${{ secrets.CDM5_SQL_SERVER_USER }}" ]; then
            echo "::notice::Skipping sqlserver tests – CDM5_SQL_SERVER_USER secret not configured"
            echo "has-secrets=false" >> "$GITHUB_OUTPUT"
          else
            echo "has-secrets=true" >> "$GITHUB_OUTPUT"
          fi

  test:
    needs: check-secrets
    if: needs.check-secrets.outputs.has-secrets == 'true'
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11"]
    env:
      CDMCONNECTOR_TEST_DB: sqlserver
      CDM5_SQL_SERVER_USER: ${{ secrets.CDM5_SQL_SERVER_USER }}
      CDM5_SQL_SERVER_PASSWORD: ${{ secrets.CDM5_SQL_SERVER_PASSWORD }}
      CDM5_SQL_SERVER_SERVER: ${{ secrets.CDM5_SQL_SERVER_SERVER }}
      CDM5_SQL_SERVER_PORT: ${{ secrets.CDM5_SQL_SERVER_PORT }}
      CDM5_SQL_SERVER_CDM_DATABASE: ${{ secrets.CDM5_SQL_SERVER_CDM_DATABASE }}
      CDM5_SQL_SERVER_CDM_SCHEMA: ${{ secrets.CDM5_SQL_SERVER_CDM_SCHEMA }}
      CDM5_SQL_SERVER_SCRATCH_SCHEMA: ${{ secrets.CDM5_SQL_SERVER_SCRATCH_SCHEMA }}

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
          pip install ibis-framework[mssql]

      - name: Run tests
        run: pytest tests -m integration -v --tb=short
