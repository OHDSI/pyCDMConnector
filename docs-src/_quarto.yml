# Quarto website — pkgdown-style: source in docs-src, output in docs/
project:
  type: website
  output-dir: ../docs

# Quarto reads quartodoc-generated sidebar and CSS
metadata-files:
  - reference/_sidebar.yml
format:
  html:
    highlight-style: github
    css:
      - stylesheets/extra.css
      - reference/_styles-quartodoc.css
    toc: true

# quartodoc: API reference from cdmconnector package (see quartodoc build)
quartodoc:
  package: cdmconnector
  sidebar: reference/_sidebar.yml
  css: reference/_styles-quartodoc.css
  sections:
    - title: CDM & connection
      desc: Core CDM object and connection helpers.
      contents:
        - Cdm
        - cdm_from_con
        - cdm_from_tables
        - cdm_tables
        - collect
        - compute
        - insert_table
        - drop_table
    - title: Cohorts
      desc: Cohort set generation.
      contents:
        - generate_cohort_set
    - title: Eunomia
      desc: Example datasets and download helpers.
      contents:
        - download_eunomia_data
        - eunomia_dir
        - eunomia_is_available
        - example_datasets
        - require_eunomia
    - title: Patient profiles
